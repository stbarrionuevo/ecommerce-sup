{% extends 'store/base.html'%}
{% block content %}
<div class="row">
    <div style="background: white; padding: 20px; border-radius: 10px; width: 100%; max-width: 600px; margin: auto;">
        <h2 style="text-align: center;">Resumen de tu Compra</h2>
        <hr>
        
        <p>Total en productos: <strong>${{ orden.precio_total|floatformat:2 }}</strong></p>
        <p>Cantidad de items: <strong>{{ items.count }}</strong></p>
        
        <form method="POST" action="{% url 'procesar_pedido' %}" style="margin-top: 20px;">
            {% csrf_token %}
            
            <h3>¿Cómo lo querés recibir?</h3>
            <div style="margin: 10px 0;">
                <label>
                    <input type="radio" name="metodo_envio" value="retiro" checked required> 
                    Retiro en el Local (Sin costo adicional)
                </label>
            </div>
            <div style="margin: 10px 0;">
                <label>
                    <input type="radio" name="metodo_envio" value="domicilio"> 
                    Envío a Domicilio ($5000)
                </label>
            </div>
            <h3>¿Cómo vas a pagar?</h3>
            <div style="margin: 10px 0;">
                <label>
                    <input type="radio" name="metodo_pago" value="mp" checked required> 
                    Mercado Pago (Tarjetas, Dinero en cuenta)
                </label>
            </div>
            <div style="margin: 10px 0;">
                <label>
                    <input type="radio" name="metodo_pago" value="transferencia"> 
                    Transferencia Bancaria (Te pasamos el CBU al final)
                </label>
            </div>
            <div style="margin: 10px 0;">
                <label>
                    <input type="radio" name="metodo_pago" value="efectivo"> 
                    Efectivo al recibir/retirar
                </label>
            </div>

            <button type="submit" class="btn" style="width: 100%; margin-top: 20px; font-size: 1.2rem;">
                CONFIRMAR Y PAGAR
            </button>
        </form>
    </div>
</div>
{% endblock %}
